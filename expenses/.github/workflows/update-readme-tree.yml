name: Update README Tree

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Генерируем структуру проекта
        run: |
          echo '```' > tree.txt
          tree -a -I ".git|node_modules|target|.idea" >> tree.txt
          echo '```' >> tree.txt

      - name: Обновляем README.md
        run: |
          # Вставляем структуру между маркерами
          sed -i '/<!-- TREE START -->/,/<!-- TREE END -->/{/<!-- TREE START -->/!{/<!-- TREE END -->/!d}}' README.md
          sed -i '/<!-- TREE START -->/r tree.txt' README.md

      - name: Коммитим и пушим
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || (git commit -m "Обновлена структура проекта в README" && git push)